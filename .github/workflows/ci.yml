name: Go CI

on:
  push:
    branches-ignore:
      - renovate/**
    tags:
      - 'ingitdb/v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching ingitdb/v*, e.g. ingitdb/v0.1.0
  pull_request:
    branches:
      - '**'

jobs:

  strongo_workflow:
    permissions:
      contents: write
    uses: strongo/go-ci-action/.github/workflows/workflow.yml@main

    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
    with:
      code_coverage: true
      min_test_coverage_percent: 80
      tag_prefix: 'ingitdb/v'
      working_directory: 'ingitdb'
